<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Videos - Tango Football Club</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/videos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <div class="header-top">
        <div class="header-brand">
            <img src="images/tangoforces.jpg" alt="Tango Forces Logo" class="header-logo">
            <h1>Tango Football Club</h1>
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="mobile-menu-btn" id="mobileMenu">
                <i class="fas fa-bars"></i>
                <span>Menu</span>
            </button>
        </div>
    </div>

    <nav>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="technical-team.html">Technical Team</a></li>
            <li><a href="roster.html">Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li><a href="league-standings.html">Standings</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="videos.html" class="active">Videos</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>
</header>


<main>

<!-- PAGE HEADER -->
<section class="gallery-header">
<h2>Club Videos</h2>
<p>Highlights, goals and moments from Tango FC</p>
</section>

<!-- VIDEO FILTERS -->
<section class="video-filters">

<button data-filter="all" class="active">All</button>
<button data-filter="champions">Champions</button>
<button data-filter="matchday">Matchday</button>

</section>


<!-- VIDEO GRID -->
<section class="gallery-container">

<h2 class="section-title">Match Highlights</h2>

<div id="videoGrid" class="videos-grid"></div>

<p id="videoCounter" class="video-counter"></p>

</section>


<!-- VIDEO LIGHTBOX -->
<div id="videoLightbox" class="video-lightbox">

<span class="close-btn">&times;</span>

<video id="lightboxVideo" controls></video>

</div>


<footer>
<p>&copy; 2026 Tango Football Club</p>
</footer>

<script src="js/theme.js"></script>
<script src="js/videos.js"></script>

</body>
</html>
